<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Dashboard - 总览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0a0e17; color: #e1e5ee; min-height: 100vh; padding: 16px; }
  h1 { text-align: center; font-size: 1.4rem; color: #6ec1e4; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 500px; margin: 0 auto; }
  .card { background: #131722; border: 1px solid #2a2f3a; border-radius: 12px; padding: 18px; text-decoration: none; color: inherit; display: block; transition: border-color 0.2s; }
  .card:hover { border-color: #6ec1e4; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .etf-name { font-size: 1.2rem; font-weight: 700; }
  .badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-watch { background: #2a2f3a; color: #888; }
  .badge-buy { background: #1a3a1a; color: #4caf50; }
  .badge-bottom { background: #3a1a1a; color: #ef5350; }
  .price { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .composite { font-size: 0.9rem; color: #888; }
  .composite span { font-weight: 600; }
  .composite .low { color: #888; }
  .composite .mid { color: #f0b90b; }
  .composite .high { color: #ef5350; }
  .updated { text-align: center; font-size: 0.75rem; color: #555; margin-top: 24px; }
</style>
</head>
<body>
<h1>📊 ETF 监控仪表盘</h1>
<div class="grid">
  <a class="card" href="spy-ahr999/index.html">
    <div class="card-header">
      <span class="etf-name">SPMO</span>
      <span class="badge badge-watch">观望</span>
    </div>
    <div class="price">加载中...</div>
    <div class="composite">Composite: <span class="low">--</span></div>
  </a>
  <a class="card" href="soxx-ahr999/index.html">
    <div class="card-header">
      <span class="etf-name">SOXX</span>
      <span class="badge badge-watch">观望</span>
    </div>
    <div class="price">加载中...</div>
    <div class="composite">Composite: <span class="low">--</span></div>
  </a>
  <a class="card" href="xmmo-ahr999/index.html">
    <div class="card-header">
      <span class="etf-name">XMMO</span>
      <span class="badge badge-watch">观望</span>
    </div>
    <div class="price">加载中...</div>
    <div class="composite">Composite: <span class="low">--</span></div>
  </a>
  <a class="card" href="xntk-ahr999/index.html">
    <div class="card-header">
      <span class="etf-name">XNTK</span>
      <span class="badge badge-watch">观望</span>
    </div>
    <div class="price">加载中...</div>
    <div class="composite">Composite: <span class="low">--</span></div>
  </a>
</div>
<div class="updated">数据更新时间: <span id="date"></span></div>

<script>
// 自动读取各 ETF 的 JSON 数据来显示最新值
const ETFS = [
  { key: 'SPMO', json: 'spy-ahr999/data/spy_daily.json', html: 'spy-ahr999/index.html', stop: 40.4, bottom: 74.5 },
  { key: 'SOXX', json: 'soxx-ahr999/data/soxx_daily.json', html: 'soxx-ahr999/index.html', stop: 40.4, bottom: 74.5 },
  { key: 'XMMO', json: 'xmmo-ahr999/data/xmmo_daily.json', html: 'xmmo-ahr999/index.html', stop: 40.4, bottom: 74.5 },
  { key: 'XNTK', json: 'xntk-ahr999/data/xntk_daily.json', html: 'xntk-ahr999/index.html', stop: 40.4, bottom: 74.5 },
];

async function loadSummary() {
  const cards = document.querySelectorAll('.card');
  for (let i = 0; i < ETFS.length; i++) {
    try {
      const resp = await fetch(ETFS[i].json);
      const data = await resp.json();
      const bars = data.bars;
      const last = bars[bars.length - 1];
      const prev = bars[bars.length - 2];
      const card = cards[i];
      
      const price = last.c;
      const composite = last.composite || 0;
      const d = new Date(last.t);
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      
      // Price change
      const chg = prev ? ((price - prev.c) / prev.c * 100) : 0;
      const chgStr = chg >= 0 ? `+${chg.toFixed(2)}%` : `${chg.toFixed(2)}%`;
      const chgColor = chg >= 0 ? '#4caf50' : '#ef5350';
      
      // Composite color
      let compClass = 'low';
      let badgeClass = 'badge-watch';
      let badgeText = '观望';
      if (composite >= 75 || composite >= ETFS[i].bottom) {
        compClass = 'high';
        badgeClass = 'badge-bottom';
        badgeText = '抄底区域';
      } else if (composite > ETFS[i].stop) {
        compClass = 'mid';
        badgeClass = 'badge-buy';
        badgeText = '定投区域';
      }
      
      card.querySelector('.price').innerHTML = `$${price.toFixed(2)} <span style="font-size:0.8rem;color:${chgColor}">${chgStr}</span>`;
      card.querySelector('.composite span').textContent = composite.toFixed(1);
      card.querySelector('.composite span').className = compClass;
      card.querySelector('.badge').textContent = badgeText;
      card.querySelector('.badge').className = 'badge ' + badgeClass;
      
      document.getElementById('date').textContent = dateStr;
    } catch(e) {
      console.warn('Failed to load', ETFS[i].key, e);
    }
  }
}
loadSummary();
</script>
</body>
</html>
