<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ETF监控仪表盘（构建于2026-06-24 21:26）</title>
<style>
  :root {
    --bg: #0b0e13; --bg-2: #121a24; --panel: #141a24;
    --border: #1f2937; --ink: #e6edf3; --ink-2: #b8c1cc;
    --muted: #6e7681; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --accent: #60a5fa; --price: #f59e0b;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body {
    background:var(--bg); color:var(--ink);
    font: 14px/1.55 -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    min-height:100vh; padding:20px;
  }
  h1 { text-align:center; font-size:1.5rem; color:var(--accent); margin-bottom:24px; font-weight:600; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:800px; margin:0 auto; }
  .card {
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:18px; text-decoration:none; color:inherit; display:block;
    transition:border-color .2s;
  }
  .card:hover { border-color:var(--accent); }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .etf-name { font-size:1.2rem; font-weight:700; }
  .badge { font-size:0.75rem; padding:3px 10px; border-radius:20px; font-weight:600; }
  .badge-观望 { background:rgba(100,116,139,0.2); color:#94a3b8; }
  .badge-定投 { background:rgba(234,179,8,0.15); color:var(--yellow); }
  .badge-抄底 { background:rgba(34,197,94,0.15); color:var(--green); }
  .price { font-size:1.6rem; font-weight:700; color:var(--price); margin-bottom:4px; }
  .price .chg { font-size:0.8rem; margin-left:6px; }
  .composite { font-size:0.9rem; color:var(--muted); }
  .composite span { font-weight:600; }
  .composite .low { color:#94a3b8; }
  .composite .mid { color:var(--yellow); }
  .composite .high { color:var(--green); }
  .meta { font-size:0.75rem; color:var(--muted); margin-top:4px; }
  .updated { text-align:center; font-size:0.75rem; color:var(--muted); margin-top:24px; }
  @media (max-width:800px) {
    .grid { grid-template-columns:1fr; max-width:500px; }
  }
</style>
</head>
<body>
<h1>📊 ETF 监控仪表盘</h1>
<div class="grid">

  <a class="card" href="spy-ahr999/index.html">
    <div class="card-header">

    <div class="meta" id="meta-XMMO"></div>

  <a class="card" href="xntk-ahr999/index.html">
    <div class="card-header">
      <span class="etf-name">XNTK</span>
      <span class="badge badge-watch" id="badge-XNTK">观望</span>
    </div>
    <div class="price" id="price-XNTK">—</div>
    <div class="composite">综合评分: <span class="low" id="comp-XNTK">—</span></div>
    <div class="meta" id="meta-XNTK"></div>
  </a>
</div>
<div class="updated" id="updated">构建于 2026-06-24 21:26</div>

<script>
var SUMMARY = {"SPMO":{"price":154.15,"prev":161.66,"composite":35.05,"rsi":50.71,"dd":-0.046456,"vol":0.3981,"date":1782172800000},"SOXX":{"price":607.64,"prev":655.01,"composite":42.8,"rsi":51.98,"dd":-0.07232,"vol":0.7704,"date":1782172800000},"XMMO":{"price":169.28,"prev":173.82,"composite":33.96,"rsi":49.7,"dd":-0.026119,"vol":0.2948,"date":1782172800000},"XNTK":{"price":368.65,"prev":389.18,"composite":36.34,"rsi":44.97,"dd":-0.052752,"vol":0.5055,"date":1782172800000}};
(function(){
  "use strict";

  var COMP_STOP = 40.0, COMP_BOTTOM = 60.0;
  var zone = function(c){
    if(c==null) return "—";
    if(c>=75||c>=COMP_BOTTOM) return "抄底";
    if(c>COMP_STOP) return "定投";
    return "观望";
  };
  var fmt$ = function(v){ return v==null?"—":"$"+v.toFixed(2); };
  var fmtDate = function(ts){ var d=new Date(ts); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };

  for(var k in SUMMARY){
    var s = SUMMARY[k];
    var c = s.composite||0;
    var z = zone(c);
    var priceEl = document.getElementById("price-"+k);
    var compEl  = document.getElementById("comp-"+k);
    var badgeEl = document.getElementById("badge-"+k);
    var metaEl  = document.getElementById("meta-"+k);

    var chg = s.prev ? ((s.price-s.prev)/s.prev*100) : 0;
    var chgStr = chg>=0 ? "+"+chg.toFixed(2)+"%" : chg.toFixed(2)+"%";
    var chgColor = chg>=0 ? "var(--green)" : "var(--red)";

    priceEl.innerHTML = fmt$(s.price) + " <span class='chg' style='color:"+chgColor+"'>"+chgStr+"</span>";
    compEl.textContent = c.toFixed(1);
    compEl.className = z=="抄底"?"high":z=="定投"?"mid":"low";
    badgeEl.textContent = z;
    badgeEl.className = "badge badge-"+z;

    var metaParts = [];
    if(s.rsi!=null) metaParts.push("RSI "+s.rsi.toFixed(1));
    if(s.dd!=null) metaParts.push("回撤 "+(s.dd*100).toFixed(1)+"%");
    if(s.vol!=null) metaParts.push("波动 "+(s.vol*100).toFixed(1)+"%");
    metaEl.textContent = metaParts.join(" | ");

    document.getElementById("updated").textContent = "数据截至 " + fmtDate(s.date) + " · 构建于 2026-06-24 21:26";
  }
})();
</script>
</body>
</html>
